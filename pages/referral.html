<div class="form-container">
  <div class="form-card">
    <h1>Submit a Referral</h1>
    <p>Fill in the patient details below</p>

    <form method="POST" action="/referral-submit.php">
      <div class="form-group">
        <label>Patient Full Name</label>
        <input type="text" name="patient_name" required>
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" required>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" name="contact" required>
      </div>
      <div class="form-group">
        <label>Location / Area</label>
        <input type="text" name="location" required>
      </div>
      <div class="form-group">
        <label>Medical Condition / Reason</label>
        <textarea name="condition" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn-primary">Submit Referral</button>
    </form>
  </div>
</div>
