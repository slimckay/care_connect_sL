<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Referral — Care Connect SL</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <base href="/">
  <style>
    .form-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .form-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      padding: 40px 36px;
      color: #1F2937;
    }
    .form-card h1 { text-align: center; margin-bottom: 8px; color: #0F1C3A !important; }
    .form-card > p.subtitle { text-align: center; color: #64748B !important; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #1F2937 !important; }
    .form-group .hint { display:block; font-weight:500; font-size:0.85rem; color:#64748B !important; margin-top:6px; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      color: #1F2937;
      background: #fff;
      font-family: inherit;
      font-size: 1rem;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { outline: none; border-color: #1EB53A; }
    .btn-primary {
      width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 12px;
      cursor: pointer; background: linear-gradient(135deg, #1EB53A, #0000CD);
      color: white; font-weight: 700;
    }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

    .doctor-box {
      border: 1.5px solid #BBF7D0;
      background: #F0FDF4;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .doctor-box strong { color: #065F46 !important; display:block; margin-bottom:8px; }

    .toast {
      display: none; align-items: flex-start; gap: 12px; padding: 16px 18px;
      border-radius: 14px; margin-bottom: 22px; font-size: 0.98rem;
      line-height: 1.45; border: 1px solid transparent;
    }
    .toast.show { display: flex; }
    .toast.success { background: #ECFDF5; border-color: #A7F3D0; color: #065F46; }
    .toast.error { background: #FEF2F2; border-color: #FECACA; color: #991B1B; }
    .toast .toast-icon { font-size: 1.35rem; line-height: 1; }
    .toast .toast-body { flex: 1; }
    .toast .toast-body strong { display: block; margin-bottom: 2px; }
    .toast .toast-close {
      background: none; border: none; font-size: 1.2rem; cursor: pointer;
      opacity: 0.6; color: inherit; padding: 0; line-height: 1;
    }

    [data-theme="dark"] .form-card { background: #1e293b !important; color: #e2e8f0 !important; }
    [data-theme="dark"] .form-card h1 { color: #f8fafc !important; }
    [data-theme="dark"] .form-card > p.subtitle { color: #94A3B8 !important; }
    [data-theme="dark"] .form-group label { color: #e2e8f0 !important; }
    [data-theme="dark"] .form-group input,
    [data-theme="dark"] .form-group textarea,
    [data-theme="dark"] .form-group select {
      background: #0f172a !important; color: #e2e8f0 !important; border-color: #334155 !important;
    }
    [data-theme="dark"] .doctor-box { background: #052e16; border-color: #166534; }
    [data-theme="dark"] .doctor-box strong { color: #bbf7d0 !important; }
  </style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="/" class="logo">Care<span class="accent">Connect</span> SL</a>
    <nav>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/pages/doctors.php">Find Care</a></li>
        <li><a href="/pages/referral.html" class="active">Referrals</a></li>
        <li><a href="/pages/contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="nav-actions">
      <button onclick="toggleDarkMode()" class="dark-toggle">🌓</button>
      <a href="/login.php" class="btn-ghost">Sign In</a>
      <a href="/register.php" class="btn-primary">Get Started</a>
    </div>
  </div>
</header>

<div class="form-container">
  <div class="form-card">
    <h1>Submit a Referral</h1>
    <p class="subtitle">Choose an available doctor or clinic, or leave it open for any provider.</p>

    <div id="toast" class="toast" role="alert" aria-live="polite">
      <div class="toast-icon" id="toastIcon"></div>
      <div class="toast-body">
        <strong id="toastTitle"></strong>
        <span id="toastMessage"></span>
      </div>
      <button type="button" class="toast-close" onclick="hideToast()" aria-label="Close">×</button>
    </div>

    <form id="referralForm" method="POST" action="/referral.php">
      <div class="doctor-box">
        <strong>👨‍⚕️ Pick a doctor / clinic (optional)</strong>
        <div class="form-group" style="margin-bottom:0;">
          <label for="assigned_to">Available providers</label>
          <select id="assigned_to" name="assigned_to">
            <option value="">Any available provider (admin / open pool)</option>
          </select>
          <span class="hint" id="providerHint">Loading available doctors...</span>
        </div>
      </div>

      <div class="form-group">
        <label for="patient_name">Patient Full Name *</label>
        <input type="text" id="patient_name" name="patient_name" required minlength="2" maxlength="100" placeholder="e.g. Mariama Sesay">
      </div>

      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="0" max="150" placeholder="e.g. 28">
      </div>

      <div class="form-group">
        <label for="contact">Contact Number or Email *</label>
        <input type="text" id="contact" name="contact" required maxlength="100" placeholder="e.g. +232 76 000 000">
      </div>

      <div class="form-group">
        <label for="location">Location / Area *</label>
        <input type="text" id="location" name="location" required minlength="3" maxlength="200" placeholder="e.g. Kissy, Freetown">
      </div>

      <div class="form-group">
        <label for="preferred_clinic">Preferred Clinic note (optional)</label>
        <input type="text" id="preferred_clinic" name="preferred_clinic" maxlength="100" placeholder="Extra note, e.g. near East End">
      </div>

      <div class="form-group">
        <label for="condition">Medical Condition / Reason *</label>
        <textarea id="condition" name="condition" rows="5" required minlength="5" maxlength="1000" placeholder="Briefly describe the condition or why care is needed"></textarea>
      </div>

      <input type="hidden" name="referrer" value="self">

      <button type="submit" class="btn-primary" id="submitBtn">Submit Referral</button>
    </form>
  </div>
</div>

<script src="/js/dark-mode.js"></script>
<script>
  function showToast(type, title, message) {
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toastIcon');
    const titleEl = document.getElementById('toastTitle');
    const msgEl = document.getElementById('toastMessage');
    toast.className = 'toast show ' + type;
    icon.textContent = type === 'success' ? '✅' : '⚠️';
    titleEl.textContent = title;
    msgEl.textContent = message;
    if (type === 'success') setTimeout(hideToast, 8000);
  }
  function hideToast() {
    document.getElementById('toast').classList.remove('show');
  }

  // Load available doctors
  (function loadProviders() {
    const select = document.getElementById('assigned_to');
    const hint = document.getElementById('providerHint');
    fetch('/api/available-providers.php', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(data => {
        const list = (data && data.providers) || [];
        if (!list.length) {
          hint.textContent = 'No listed providers yet. Your referral will go to the open pool.';
          return;
        }
        list.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = (p.verified ? '✅ ' : '') + p.label;
          select.appendChild(opt);
        });
        hint.textContent = list.length + ' provider(s) available. Pick one or leave as open pool.';

        // Preselect if ?doctor=ID in URL (from Find Care page later)
        const params = new URLSearchParams(window.location.search);
        const doc = params.get('doctor');
        if (doc && select.querySelector('option[value="' + doc + '"]')) {
          select.value = doc;
        }
      })
      .catch(() => {
        hint.textContent = 'Could not load provider list. You can still submit to the open pool.';
      });
  })();

  (function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get('sent') === '1') {
      const assigned = params.get('assigned');
      showToast(
        'success',
        'Referral submitted successfully!',
        assigned === '1'
          ? 'Your chosen doctor/clinic has been notified. They will follow up soon.'
          : 'Our team received it. An available provider can pick it up soon.'
      );
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    const error = params.get('error');
    if (error) {
      let message = 'Something went wrong. Please try again.';
      if (error === 'validation') message = 'Please check the form fields and try again.';
      if (error === 'too_many') message = 'Too many submissions from this device. Please wait a while and try again.';
      if (error === 'server') message = 'Server error while saving. Please try again in a moment.';
      if (error === 'doctor') message = 'Selected doctor is not available. Pick another or leave open.';
      showToast('error', 'Could not submit referral', message);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  })();

  document.getElementById('referralForm').addEventListener('submit', function () {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';
  });
</script>
</body>
</html>
