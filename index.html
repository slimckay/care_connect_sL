    #splash {

      background-color: #1EB53A;

    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;

      animation: fadeUp 1.2s ease 3.1s forwards;
      opacity: 0;
    }

    .loading-dots span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      animation: bounce-dot 1.4s infinite both;
    }
    .loading-dots span:nth-child(1) { background: #1EB53A; animation-delay: 0s; }
    .loading-dots span:nth-child(2) { background: #FFFFFF; animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { background: #0000CD; animation-delay: 0.4s; }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

<script>
  // JavaScript Typewriter Effect
  function typeWriter(element, text, speed = 120) {
    let i = 0;
    element.innerHTML = '';

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    element.appendChild(cursor);

    function typing() {
      if (i < text.length) {
        // Insert text before cursor
        const textNode = document.createTextNode(text.charAt(i));
        element.insertBefore(textNode, cursor);
        i++;
        setTimeout(typing, speed);
      } else {
        // Keep cursor blinking after typing finishes
        setTimeout(() => {
          cursor.style.animation = 'blink 0.7s step-end infinite';
        }, 300);
      }
    }

    typing();
  }

  // Initialize splash screen
  document.addEventListener('DOMContentLoaded', function() {
    const splash = document.getElementById('splash');
    const typewriterEl = document.getElementById('typewriter-text');

    // Start typewriter effect
    const fullText = 'CareConnect SL';
    typeWriter(typewriterEl, fullText, 110);

    // Hide splash after animation completes
    setTimeout(function() {
      splash.classList.add('hidden');
    }, 3800);
  });
</script>
