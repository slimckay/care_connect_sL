  <style>
    /* Splash Screen */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(135deg, #0A1628 0%, #1a2a4a 50%, #0A1628 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .typewriter {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #1EB53A;
      animation: typing 2s steps(13, end) forwards, blink-caret 0.75s step-end infinite;
    }

    .typewriter .accent {
      color: #1EB53A;
    }

    .typewriter .blue {
      color: #0000CD;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: #1EB53A; }
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;
      margin-top: 12px;
      letter-spacing: 0.1em;
      animation: fadeUp 1.2s ease 2.2s forwards;
      opacity: 0;
    }

    .loading-dots {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      animation: fadeUp 1.2s ease 2.5s forwards;
      opacity: 0;
    }

    .loading-dots span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      animation: bounce-dot 1.4s infinite both;
    }
    .loading-dots span:nth-child(1) { background: #1EB53A; animation-delay: 0s; }
    .loading-dots span:nth-child(2) { background: #FFFFFF; animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { background: #0000CD; animation-delay: 0.4s; }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero and other styles remain the same as before */
    .hero {
      background: linear-gradient(135deg, rgba(30,181,58,0.92) 0%, rgba(255,255,255,0.3) 40%, rgba(0,0,205,0.92) 100%),
        url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
    }
  </style>
